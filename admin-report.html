<!DOCTYPE html>
<html>
<head>
    <title>Admin - Reports - Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            margin: 0;
            color: #2c3e50;
        }
        
        .nav-links a {
            margin-left: 20px;
            color: #3498db;
            text-decoration: none;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #3498db;
        }
        
        .stat-label {
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #ecf0f1;
            color: #7f8c8d;
        }
        
        .filter-btn.active {
            background: #3498db;
            color: white;
        }
        
        .reports-list {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .report-item {
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .report-item:last-child {
            border-bottom: none;
        }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .report-title {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .report-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-reviewed {
            background: #d4edda;
            color: #155724;
        }
        
        .report-reason {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .report-details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #34495e;
        }
        
        .report-meta {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .report-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .view-btn {
            background: #3498db;
            color: white;
        }
        
        .resolve-btn {
            background: #27ae60;
            color: white;
        }
        
        .dismiss-btn {
            background: #95a5a6;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Knowledge Hub - Admin</h1>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
            <a href="admin-reports.html">Reports</a>
        </div>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="stat-number" id="pending-count">0</div>
            <div class="stat-label">Pending Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="total-count">0</div>
            <div class="stat-label">Total Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="videos-count">0</div>
            <div class="stat-label">Total Videos</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="users-count">0</div>
            <div class="stat-label">Total Users</div>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterReports('all')">All Reports</button>
        <button class="filter-btn" onclick="filterReports('pending')">Pending</button>
        <button class="filter-btn" onclick="filterReports('reviewed')">Reviewed</button>
    </div>

    <div id="reports-container" class="reports-list">
        <div class="loading">Loading reports...</div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentFilter = 'all';
        
        window.onload = function() {
            checkAuth();
        };
        
        async function checkAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            loadReports();
            loadStats();
        }
        
        async function loadReports() {
            try {
                let query = supabaseClient
                    .from('reports')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (currentFilter !== 'all') {
                    query = query.eq('status', currentFilter);
                }
                
                const { data: reports, error } = await query;
                
                if (error) throw error;
                
                displayReports(reports || []);
                
            } catch (error) {
                console.error('Error loading reports:', error);
                document.getElementById('reports-container').innerHTML = '<div class="loading">Error loading reports</div>';
            }
        }
        
        async function loadStats() {
            try {
                // Get report counts
                const { count: pendingCount } = await supabaseClient
                    .from('reports')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'pending');
                
                const { count: totalReports } = await supabaseClient
                    .from('reports')
                    .select('*', { count: 'exact', head: true });
                
                const { count: totalVideos } = await supabaseClient
                    .from('videos')
                    .select('*', { count: 'exact', head: true });
                
                const { count: totalUsers } = await supabaseClient
                    .from('users')
                    .select('*', { count: 'exact', head: true });
                
                document.getElementById('pending-count').textContent = pendingCount || 0;
                document.getElementById('total-count').textContent = totalReports || 0;
                document.getElementById('videos-count').textContent = totalVideos || 0;
                document.getElementById('users-count').textContent = totalUsers || 0;
                
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        function displayReports(reports) {
            if (reports.length === 0) {
                document.getElementById('reports-container').innerHTML = '<div class="loading">No reports found</div>';
                return;
            }
            
            let html = '';
            
            for (let report of reports) {
                const date = new Date(report.created_at).toLocaleString();
                const statusClass = `report-status status-${report.status}`;
                
                html += `
                    <div class="report-item">
                        <div class="report-header">
                            <span class="report-title">Report #${report.id}</span>
                            <span class="${statusClass}">${report.status}</span>
                        </div>
                        <div class="report-reason">${escapeHtml(report.reason)}</div>
                        ${report.details ? `
                            <div class="report-details">${escapeHtml(report.details)}</div>
                        ` : ''}
                        <div class="report-meta">
                            Video ID: ${report.video_id} | 
                            Reported: ${date} |
                            Reporter: ${report.reporter_email || 'Anonymous'}
                        </div>
                        <div class="report-actions">
                            <button class="action-btn view-btn" onclick="viewVideo(${report.video_id})">View Video</button>
                            <button class="action-btn resolve-btn" onclick="updateStatus(${report.id}, 'resolved')">Mark Resolved</button>
                            <button class="action-btn dismiss-btn" onclick="updateStatus(${report.id}, 'dismissed')">Dismiss</button>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('reports-container').innerHTML = html;
        }
        
        function filterReports(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadReports();
        }
        
        async function updateStatus(reportId, status) {
            try {
                const { error } = await supabaseClient
                    .from('reports')
                    .update({ status: status })
                    .eq('id', reportId);
                
                if (error) throw error;
                
                loadReports(); // Refresh the list
                
            } catch (error) {
                console.error('Error updating report:', error);
                alert('Error updating report');
            }
        }
        
        function viewVideo(videoId) {
            window.open(`video.html?id=${videoId}`, '_blank');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
