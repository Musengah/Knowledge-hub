<!DOCTYPE html>
<html>
<head>
    <title>Upload - Knowledge Hub</title>
</head>
<body>
    <div id="message"></div>
    
    <div id="login-prompt">
        <p>Please <a href="login.html">log in</a> to upload</p>
    </div>
    
    <div id="upload-form" style="display: none;">
        <button onclick="switchTab('video')">Video</button>
        <button onclick="switchTab('document')">Document</button>
        
        <!-- Video Form -->
        <div id="video-form">
            <input type="text" id="video-url" placeholder="YouTube URL">
        </div>
        
        <!-- Document Form -->
        <div id="document-form" style="display: none;">
            <input type="file" id="file-input" accept=".pdf,.epub">
        </div>
        
        <!-- Common Fields -->
        <input type="text" id="title" placeholder="Title">
        <select id="category">
            <option value="Computer Science">Computer Science</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="Engineering">Engineering</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="institution" placeholder="Institution (optional)">
        <input type="text" id="tags" placeholder="Tags (comma separated)">
        <textarea id="description" placeholder="Description (optional)"></textarea>
        <button onclick="submitUpload()">Upload</button>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentTab = 'video';
        let selectedFile = null;
        let currentUser = null;
        
        window.onload = async function() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('login-prompt').style.display = 'none';
                document.getElementById('upload-form').style.display = 'block';
            }
        };
        
        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'video') {
                document.getElementById('video-form').style.display = 'block';
                document.getElementById('document-form').style.display = 'none';
            } else {
                document.getElementById('video-form').style.display = 'none';
                document.getElementById('document-form').style.display = 'block';
            }
        }
        
        document.getElementById('file-input').addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
        });
        
        async function submitUpload() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const institution = document.getElementById('institution').value;
            const tags = document.getElementById('tags').value;
            const description = document.getElementById('description').value;
            
            if (!title || !category || !tags) {
                alert('Please fill title, category, and tags');
                return;
            }
            
            if (currentTab === 'video') {
                await submitVideo(title, category, institution, tags, description);
            } else {
                await submitDocument(title, category, institution, tags, description);
            }
        }
        
        async function submitVideo(title, category, institution, tags, description) {
            const url = document.getElementById('video-url').value;
            if (!url) {
                alert('Please enter YouTube URL');
                return;
            }
            
            let videoId = '';
            try {
                const urlObj = new URL(url);
                if (urlObj.hostname.includes('youtube.com')) {
                    videoId = urlObj.searchParams.get('v');
                } else if (urlObj.hostname.includes('youtu.be')) {
                    videoId = urlObj.pathname.slice(1);
                }
            } catch(e) {
                alert('Invalid YouTube URL');
                return;
            }
            
            if (!videoId) {
                alert('Could not extract video ID');
                return;
            }
            
            // Check duplicate
            const { data: existing } = await supabase
                .from('videos')
                .select('id')
                .eq('youtube_id', videoId)
                .maybeSingle();
            
            if (existing) {
                alert('This video already exists');
                return;
            }
            
            const { error } = await supabase
                .from('videos')
                .insert({
                    youtube_url: url,
                    youtube_id: videoId,
                    title: title,
                    category: category,
                    institution: institution || null,
                    tags: tags,
                    description: description || null,
                    user_id: currentUser.id,
                    submitter_email: currentUser.email
                });
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Upload successful!');
                clearForm();
            }
        }
        
        async function submitDocument(title, category, institution, tags, description) {
            if (!selectedFile) {
                alert('Please select a file');
                return;
            }
            
            const fileExt = selectedFile.name.split('.').pop().toLowerCase();
            if (fileExt !== 'pdf' && fileExt !== 'epub') {
                alert('Only PDF and EPUB files are supported');
                return;
            }
            
            if (selectedFile.size > 50 * 1024 * 1024) {
                alert('File must be less than 50MB');
                return;
            }
            
            const fileName = `${Date.now()}_${selectedFile.name}`;
            const filePath = `${currentUser.id}/${fileName}`;
            
            // Upload file
            const { error: uploadError } = await supabase
                .storage
                .from('documents')
                .upload(filePath, selectedFile);
            
            if (uploadError) {
                alert('Upload error: ' + uploadError.message);
                return;
            }
            
            // Get public URL
            const { data: { publicUrl } } = supabase
                .storage
                .from('documents')
                .getPublicUrl(filePath);
            
            // Save to database
            const { error: dbError } = await supabase
                .from('documents')
                .insert({
                    title: title,
                    category: category,
                    institution: institution || null,
                    tags: tags,
                    description: description || null,
                    file_name: selectedFile.name,
                    file_url: publicUrl,
                    file_size: selectedFile.size,
                    file_type: fileExt,
                    user_id: currentUser.id,
                    submitter_email: currentUser.email
                });
            
            if (dbError) {
                alert('Database error: ' + dbError.message);
            } else {
                alert('Document uploaded successfully!');
                clearForm();
                selectedFile = null;
                document.getElementById('file-input').value = '';
            }
        }
        
        function clearForm() {
            document.getElementById('video-url').value = '';
            document.getElementById('title').value = '';
            document.getElementById('category').value = '';
            document.getElementById('institution').value = '';
            document.getElementById('tags').value = '';
            document.getElementById('description').value = '';
        }
    </script>
</body>
</html>
