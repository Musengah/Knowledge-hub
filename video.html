<!DOCTYPE html>
<html>
<head>
    <title>Watch Video - Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .nav {
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
        }
        .nav a {
            margin-right: 15px;
            color: blue;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back {
            margin-bottom: 15px;
        }
        .back a {
            color: blue;
            text-decoration: none;
        }
        h1 {
            font-size: 24px;
            margin: 15px 0;
        }
        .meta {
            color: #666;
            margin: 10px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .tags {
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin: 10px 0;
        }
        .description {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
        }
        iframe {
            width: 100%;
            height: 450px;
            border: none;
            border-radius: 8px;
        }
        .message {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="upload.html">Upload</a>
        <a href="my-uploads.html">My Uploads</a>
        <a href="login.html">Login</a>
    </div>
    
    <div class="container">
        <div class="back">
            <a href="browse.html">← Back to Browse</a>
        </div>
        <div id="content"></div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        
        if (!videoId) {
            document.getElementById('content').innerHTML = '<div class="message">No video specified</div>';
        } else {
            loadVideo(videoId);
        }
        
        async function loadVideo(id) {
            try {
                const { data: video, error } = await supabase
                    .from('videos')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                const embedUrl = `https://www.youtube.com/embed/${video.youtube_id}`;
                
                const html = `
                    <iframe src="${embedUrl}" allowfullscreen></iframe>
                    <h1>${escapeHtml(video.title)}</h1>
                    <div class="meta">
                        <strong>${escapeHtml(video.category)}</strong>
                        ${video.institution ? ' · ' + escapeHtml(video.institution) : ' · Independent'}
                        · Added ${new Date(video.created_at).toLocaleDateString()}
                    </div>
                    <div class="tags">🏷️ ${escapeHtml(video.tags)}</div>
                    ${video.description ? `<div class="description">${escapeHtml(video.description).replace(/\n/g, '<br>')}</div>` : ''}
                `;
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="message">Error loading video</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
