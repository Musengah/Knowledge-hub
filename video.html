<!DOCTYPE html>
<html>
<head>
    <title>Watch Video - Knowledge Hub</title>
</head>
<body>
    <a href="browse.html">← Back</a>
    <div id="content"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        
        if (!videoId) {
            document.getElementById('content').innerHTML = '<p>No video specified</p>';
        } else {
            loadVideo(videoId);
        }
        
        async function loadVideo(id) {
            try {
                const { data: video, error } = await supabase
                    .from('videos')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                const embedUrl = `https://www.youtube.com/embed/${video.youtube_id}`;
                
                const html = `
                    <h1>${escapeHtml(video.title)}</h1>
                    <p>${escapeHtml(video.category)} | ${video.institution ? escapeHtml(video.institution) : 'Independent'}</p>
                    <p>Tags: ${escapeHtml(video.tags)}</p>
                    ${video.description ? `<p>${escapeHtml(video.description)}</p>` : ''}
                    <iframe width="100%" height="500" src="${embedUrl}" frameborder="0" allowfullscreen></iframe>
                `;
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<p>Error loading video</p>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
