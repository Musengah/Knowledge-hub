<!DOCTYPE html>
<html>
<head>
    <title>Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;

            padding: 20px;

        h1 {
            color: #2c3e50;

        }
        p {
            color: #34495e;
            text-align: center;
        }
        .coming-soon {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 30px;
            margin-top: 40px;

</head>
<body>
    <div style="margin-top: 30px; padding: 15px; background: #e8f4f8; border-radius: 8px;">
        <p id="db-status">⏳ Testing database connection...</p>
        <p id="video-count"></p>
    </div>
    <h1>Knowledge Hub</h1>
    <p>A simple library of educational videos</p>
    
    <div class="coming-soon">
        <h2>Coming Soon</h2>

    </footer>
    <!-- Add Supabase connection -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
    // Initialize Supabase client
    const supabaseUrl = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycG1lcHN4dXZwc3h3Y2dsd2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzgwNjksImV4cCI6MjA4OTI1NDA2OX0.4Pe6yl1I4H0OFUaRXdP9caimJjVGtLcaNJrOW12p34A';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    // Test the connection and show video count
    async function testConnection() {
        try {
            const { data, error } = await supabase
                .from('videos')
                .select('*', { count: 'exact', head: true });
            
            if (error) throw error;
            
            // Update the page with connection status
            document.getElementById('db-status').innerHTML = 
                '✅ Database connected - Ready to add videos';
            document.getElementById('video-count').innerHTML = 
                `📊 Current library: 0 videos (waiting for first upload)`;
        } catch (error) {
            document.getElementById('db-status').innerHTML = 
                '❌ Database connection issue - Check configuration';
            console.error('Error:', error);
        }
    }
    
    // Run the test when page loads
    testConnection();
</script>
