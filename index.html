    <!-- Add Supabase connection -->
<!-- Load Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
    // Replace these with your actual values from Supabase
    const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
    
    console.log('URL:', SUPABASE_URL);
    console.log('Key starts with:', SUPABASE_KEY.substring(0, 10) + '...');
    
    // Create the client - only once
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Test the connection
    async function checkDatabase() {
        try {
            console.log('Testing connection...');
            
            const { data, error, count } = await supabaseClient
                .from('videos')
                .select('*', { count: 'exact', head: true });
            
            if (error) {
                console.error('Database error:', error);
                document.getElementById('db-status').innerHTML = 
                    '❌ Database error: ' + error.message;
                return;
            }
            
            console.log('Connected! Count:', count);
            document.getElementById('db-status').innerHTML = 
                '✅ Database connected';
            document.getElementById('video-count').innerHTML = 
                `📚 Library has ${count || 0} videos`;
            
        } catch (err) {
            console.error('Connection failed:', err);
            document.getElementById('db-status').innerHTML = 
                '❌ Failed: ' + err.message;
        }
    }
    
    // Run it when page loads
    checkDatabase();
</script>
</body>
