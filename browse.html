<!DOCTYPE html>
<html>
<head>
    <title>Browse - Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .nav {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav a {
            margin-right: 20px;
            color: #3498db;
            text-decoration: none;
        }
        .search-bar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .search-bar input {
            padding: 10px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-bar button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .filters {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filters button {
            padding: 6px 15px;
            cursor: pointer;
            background: #ecf0f1;
            border: none;
            border-radius: 20px;
        }
        .filters button.active {
            background: #3498db;
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .thumbnail {
            width: 100%;
            height: 150px;
            background: #ecf0f1;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #2c3e50;
        }
        .meta {
            font-size: 12px;
            color: #7f8c8d;
            margin: 5px 0;
        }
        .tags {
            font-size: 11px;
            color: #95a5a6;
        }
        .message {
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
        }
        .error-message {
            text-align: center;
            padding: 50px;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="upload.html">Upload</a>
        <a href="my-uploads.html">My Uploads</a>
        <a href="login.html">Login</a>
    </div>
    
    <div class="search-bar">
        <input type="text" id="search" placeholder="Search by title, tags, or institution..." onkeyup="if(event.keyCode===13) searchContent()">
        <button onclick="searchContent()">Search</button>
    </div>
    
    <div class="filters">
        <button class="active" onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('Computer Science')">CS</button>
        <button onclick="filterCategory('Mathematics')">Math</button>
        <button onclick="filterCategory('Physics')">Physics</button>
        <button onclick="filterCategory('Chemistry')">Chemistry</button>
        <button onclick="filterCategory('Biology')">Biology</button>
        <button onclick="filterCategory('Engineering')">Engineering</button>
        <button onclick="filterCategory('Research Paper')">Research</button>
        <button onclick="filterCategory('Thesis')">Thesis</button>
        <button onclick="filterCategory('Other')">Other</button>
    </div>
    
    <div id="results" class="grid">
        <div class="message">Loading content...</div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Create client only once, no redeclaration
        const _SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const _SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const _supabase = supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY);
        
        let currentCategory = 'all';
        let currentSearch = '';
        
        window.onload = function() {
            console.log('Page loaded, fetching content...');
            loadContent();
        };
        
        async function loadContent() {
            const container = document.getElementById('results');
            container.innerHTML = '<div class="message">Loading content...</div>';
            
            try {
                console.log('Fetching videos...');
                // Fetch videos
                let videoQuery = _supabase
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                console.log('Fetching documents...');
                // Fetch documents
                let docQuery = _supabase
                    .from('documents')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                // Apply category filter
                if (currentCategory !== 'all') {
                    console.log('Filtering by category:', currentCategory);
                    videoQuery = videoQuery.eq('category', currentCategory);
                    docQuery = docQuery.eq('category', currentCategory);
                }
                
                // Apply search
                if (currentSearch) {
                    console.log('Searching for:', currentSearch);
                    videoQuery = videoQuery.or(`title.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%,institution.ilike.%${currentSearch}%`);
                    docQuery = docQuery.or(`title.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%,institution.ilike.%${currentSearch}%`);
                }
                
                const [videosResult, docsResult] = await Promise.all([
                    videoQuery,
                    docQuery
                ]);
                
                console.log('Videos result:', videosResult);
                console.log('Documents result:', docsResult);
                
                if (videosResult.error) {
                    console.error('Videos error:', videosResult.error);
                }
                if (docsResult.error) {
                    console.error('Documents error:', docsResult.error);
                }
                
                const videos = (videosResult.data || []).map(v => ({ ...v, type: 'video' }));
                const documents = (docsResult.data || []).map(d => ({ ...d, type: 'document' }));
                
                console.log(`Found ${videos.length} videos and ${documents.length} documents`);
                
                const allItems = [...videos, ...documents];
                allItems.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                if (allItems.length === 0) {
                    container.innerHTML = '<div class="message">No content found. Be the first to <a href="upload.html">upload something!</a></div>';
                    return;
                }
                
                displayResults(allItems);
                
            } catch (error) {
                console.error('Fatal error:', error);
                container.innerHTML = `<div class="error-message">Error loading content: ${error.message}</div>`;
            }
        }
        
        function displayResults(items) {
            const container = document.getElementById('results');
            let html = '<div class="grid">';
            
            for (let item of items) {
                let thumbnailHtml = '';
                let typeIcon = '';
                let linkPage = '';
                
                if (item.type === 'video') {
                    typeIcon = '📹';
                    linkPage = 'video.html';
                    thumbnailHtml = `<div class="thumbnail"><img src="https://img.youtube.com/vi/${item.youtube_id}/mqdefault.jpg" onerror="this.src='https://via.placeholder.com/300x150?text=No+Thumbnail'"></div>`;
                } else {
                    typeIcon = item.file_type === 'pdf' ? '📕' : '📘';
                    linkPage = 'document.html';
                    thumbnailHtml = `<div class="thumbnail" style="background: #3498db; color: white; font-size: 48px;">${typeIcon}</div>`;
                }
                
                html += `
                    <div class="card" onclick="window.location.href='${linkPage}?id=${item.id}'">
                        ${thumbnailHtml}
                        <h3>${typeIcon} ${escapeHtml(item.title)}</h3>
                        <div class="meta">${escapeHtml(item.category)} ${item.institution ? '· ' + escapeHtml(item.institution) : ''}</div>
                        <div class="tags">🏷️ ${escapeHtml(item.tags)}</div>
                    </div>
                `;
            }
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        function searchContent() {
            currentSearch = document.getElementById('search').value;
            console.log('Searching for:', currentSearch);
            loadContent();
        }
        
        function filterCategory(category) {
            currentCategory = category;
            console.log('Filtering by category:', category);
            
            document.querySelectorAll('.filters button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadContent();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
