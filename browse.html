<!DOCTYPE html>
<html>
<head>
    <title>Browse - Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .nav {
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
        }
        .nav a {
            margin-right: 15px;
            color: blue;
            text-decoration: none;
        }
        .search-bar {
            margin-bottom: 20px;
            padding: 10px;
            background: #f9f9f9;
        }
        .search-bar input {
            padding: 8px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-bar button {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .filters {
            margin-bottom: 20px;
        }
        .filters button {
            padding: 5px 12px;
            margin-right: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .filters button.active {
            background: #007bff;
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            background: white;
        }
        .card:hover {
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .thumbnail {
            width: 100%;
            height: 150px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 40px;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        .meta {
            font-size: 12px;
            color: #666;
            margin: 5px 0;
        }
        .tags {
            font-size: 11px;
            color: #888;
        }
        .message {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="upload.html">Upload</a>
        <a href="my-uploads.html">My Uploads</a>
        <a href="login.html">Login</a>
    </div>
    
    <div class="search-bar">
        <input type="text" id="search" placeholder="Search by title, tags, or institution..." onkeyup="if(event.keyCode===13) searchContent()">
        <button onclick="searchContent()">Search</button>
    </div>
    
    <div class="filters">
        <button class="active" onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('Computer Science')">Computer Science</button>
        <button onclick="filterCategory('Mathematics')">Mathematics</button>
        <button onclick="filterCategory('Physics')">Physics</button>
        <button onclick="filterCategory('Chemistry')">Chemistry</button>
        <button onclick="filterCategory('Biology')">Biology</button>
        <button onclick="filterCategory('Engineering')">Engineering</button>
        <button onclick="filterCategory('Other')">Other</button>
    </div>
    
    <div id="results" class="grid"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentCategory = 'all';
        let currentSearch = '';
        
        window.onload = function() {
            loadContent();
        };
        
        async function loadContent() {
            try {
                let videoQuery = supabase
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                let docQuery = supabase
                    .from('documents')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (currentCategory !== 'all') {
                    videoQuery = videoQuery.eq('category', currentCategory);
                    docQuery = docQuery.eq('category', currentCategory);
                }
                
                if (currentSearch) {
                    videoQuery = videoQuery.or(`title.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%,institution.ilike.%${currentSearch}%`);
                    docQuery = docQuery.or(`title.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%,institution.ilike.%${currentSearch}%`);
                }
                
                const [videos, docs] = await Promise.all([videoQuery, docQuery]);
                
                const allItems = [
                    ...(videos.data || []).map(v => ({ ...v, type: 'video' })),
                    ...(docs.data || []).map(d => ({ ...d, type: 'document' }))
                ];
                
                allItems.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                displayResults(allItems);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = '<div class="message">Error loading content</div>';
            }
        }
        
        function displayResults(items) {
            const container = document.getElementById('results');
            
            if (items.length === 0) {
                container.innerHTML = '<div class="message">No content found</div>';
                return;
            }
            
            let html = '';
            
            for (let item of items) {
                if (item.type === 'video') {
                    html += `
                        <div class="card" onclick="window.location.href='video.html?id=${item.id}'">
                            <div class="thumbnail">
                                <img src="https://img.youtube.com/vi/${item.youtube_id}/mqdefault.jpg" onerror="this.src='https://via.placeholder.com/300x150?text=No+Thumbnail'">
                            </div>
                            <h3>📹 ${escapeHtml(item.title)}</h3>
                            <div class="meta">${escapeHtml(item.category)} ${item.institution ? '· ' + escapeHtml(item.institution) : ''}</div>
                            <div class="tags">${escapeHtml(item.tags)}</div>
                        </div>
                    `;
                } else {
                    let icon = item.file_type === 'pdf' ? '📕' : '📘';
                    html += `
                        <div class="card" onclick="window.location.href='document.html?id=${item.id}'">
                            <div class="thumbnail" style="background: #3498db; color: white; font-size: 48px;">
                                ${icon}
                            </div>
                            <h3>${icon} ${escapeHtml(item.title)}</h3>
                            <div class="meta">${escapeHtml(item.category)} ${item.institution ? '· ' + escapeHtml(item.institution) : ''}</div>
                            <div class="tags">${escapeHtml(item.tags)}</div>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html;
        }
        
        function searchContent() {
            currentSearch = document.getElementById('search').value;
            loadContent();
        }
        
        function filterCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.filters button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadContent();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
