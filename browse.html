<!DOCTYPE html>
<html>
<head>
    <title>Browse - Knowledge Hub</title>
</head>
<body>
    <div>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="my-uploads.html">My Uploads</a>
        <a href="login.html">Login</a>
    </div>
    
    <input type="text" id="search" placeholder="Search...">
    <button onclick="searchContent()">Search</button>
    
    <div>
        <button onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('Computer Science')">Computer Science</button>
        <button onclick="filterCategory('Mathematics')">Mathematics</button>
        <button onclick="filterCategory('Physics')">Physics</button>
    </div>
    
    <div id="results"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentCategory = 'all';
        let currentSearch = '';
        
        window.onload = function() {
            loadContent();
        };
        
        async function loadContent() {
            try {
                // Fetch videos
                let videoQuery = supabase
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                // Fetch documents
                let docQuery = supabase
                    .from('documents')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                // Apply category filter
                if (currentCategory !== 'all') {
                    videoQuery = videoQuery.eq('category', currentCategory);
                    docQuery = docQuery.eq('category', currentCategory);
                }
                
                // Apply search
                if (currentSearch) {
                    videoQuery = videoQuery.or(`title.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%,institution.ilike.%${currentSearch}%`);
                    docQuery = docQuery.or(`title.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%,institution.ilike.%${currentSearch}%`);
                }
                
                const [videos, docs] = await Promise.all([
                    videoQuery,
                    docQuery
                ]);
                
                const allItems = [
                    ...(videos.data || []).map(v => ({ ...v, type: 'video' })),
                    ...(docs.data || []).map(d => ({ ...d, type: 'document' }))
                ];
                
                allItems.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                displayResults(allItems);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = '<p>Error loading content</p>';
            }
        }
        
        function displayResults(items) {
            if (items.length === 0) {
                document.getElementById('results').innerHTML = '<p>No content found</p>';
                return;
            }
            
            let html = '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">';
            
            for (let item of items) {
                if (item.type === 'video') {
                    html += `
                        <div onclick="window.location.href='video.html?id=${item.id}'" style="border: 1px solid #ddd; padding: 15px; cursor: pointer;">
                            <img src="https://img.youtube.com/vi/${item.youtube_id}/mqdefault.jpg" width="100%">
                            <h3>${escapeHtml(item.title)}</h3>
                            <p>${escapeHtml(item.category)}${item.institution ? ' · ' + escapeHtml(item.institution) : ''}</p>
                            <p>${escapeHtml(item.tags)}</p>
                        </div>
                    `;
                } else {
                    let icon = item.file_type === 'pdf' ? '📕 PDF' : '📘 EPUB';
                    html += `
                        <div onclick="window.location.href='document.html?id=${item.id}'" style="border: 1px solid #ddd; padding: 15px; cursor: pointer;">
                            <div style="background: #3498db; color: white; padding: 40px; text-align: center; font-size: 24px;">${icon}</div>
                            <h3>${escapeHtml(item.title)}</h3>
                            <p>${escapeHtml(item.category)}${item.institution ? ' · ' + escapeHtml(item.institution) : ''}</p>
                            <p>${escapeHtml(item.tags)}</p>
                        </div>
                    `;
                }
            }
            
            html += '</div>';
            document.getElementById('results').innerHTML = html;
        }
        
        function searchContent() {
            currentSearch = document.getElementById('search').value;
            loadContent();
        }
        
        function filterCategory(category) {
            currentCategory = category;
            loadContent();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
