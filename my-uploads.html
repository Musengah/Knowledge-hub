<!DOCTYPE html>
<html>
<head>
    <title>My Uploads - Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .nav {
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
        }
        .nav a {
            margin-right: 15px;
            color: blue;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 {
            margin-bottom: 20px;
        }
        .item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: white;
        }
        .item h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }
        .meta {
            font-size: 12px;
            color: #666;
            margin: 5px 0;
        }
        .actions {
            margin-top: 10px;
        }
        .actions button {
            padding: 5px 12px;
            margin-right: 8px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f0f0f0;
        }
        .actions button:hover {
            background: #e0e0e0;
        }
        .actions .delete {
            background: #dc3545;
            color: white;
            border: none;
        }
        .actions .delete:hover {
            background: #c82333;
        }
        .actions a {
            color: #007bff;
            text-decoration: none;
            margin-left: 8px;
        }
        .login-prompt {
            text-align: center;
            padding: 30px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .message {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="upload.html">Upload</a>
        <a href="my-uploads.html">My Uploads</a>
        <a href="login.html">Login</a>
    </div>
    
    <div class="container">
        <div id="login-prompt" class="login-prompt">
            <p>Please <a href="login.html">log in</a> to see your uploads</p>
        </div>
        
        <div id="uploads-container" style="display: none;">
            <h2>My Uploads</h2>
            <div id="uploads-list"></div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        
        window.onload = async function() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('login-prompt').style.display = 'none';
                document.getElementById('uploads-container').style.display = 'block';
                loadUploads();
            }
        };
        
        async function loadUploads() {
            try {
                const [videos, documents] = await Promise.all([
                    supabase.from('videos').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
                    supabase.from('documents').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false })
                ]);
                
                const allItems = [
                    ...(videos.data || []).map(v => ({ ...v, type: 'video' })),
                    ...(documents.data || []).map(d => ({ ...d, type: 'document' }))
                ];
                
                if (allItems.length === 0) {
                    document.getElementById('uploads-list').innerHTML = '<div class="message">You haven\'t uploaded anything yet. <a href="upload.html">Upload something!</a></div>';
                    return;
                }
                
                let html = '';
                
                for (let item of allItems) {
                    const date = new Date(item.created_at).toLocaleDateString();
                    
                    if (item.type === 'video') {
                        html += `
                            <div class="item">
                                <h3>📹 ${escapeHtml(item.title)}</h3>
                                <div class="meta">${escapeHtml(item.category)} | ${item.institution ? escapeHtml(item.institution) : 'Independent'} | Uploaded: ${date}</div>
                                <div class="tags" style="font-size: 12px; color: #888;">${escapeHtml(item.tags)}</div>
                                <div class="actions">
                                    <button onclick="editItem('video', '${item.id}', '${escapeHtml(item.title).replace(/'/g, "\\'")}')">Edit Title</button>
                                    <button class="delete" onclick="deleteItem('video', '${item.id}')">Delete</button>
                                    <a href="video.html?id=${item.id}">View →</a>
                                </div>
                            </div>
                        `;
                    } else {
                        const icon = item.file_type === 'pdf' ? '📕' : '📘';
                        html += `
                            <div class="item">
                                <h3>${icon} ${escapeHtml(item.title)}</h3>
                                <div class="meta">${escapeHtml(item.category)} | ${item.institution ? escapeHtml(item.institution) : 'Independent'} | ${(item.file_size / 1024 / 1024).toFixed(1)} MB | Uploaded: ${date}</div>
                                <div class="tags" style="font-size: 12px; color: #888;">${escapeHtml(item.tags)}</div>
                                <div class="actions">
                                    <button onclick="editItem('document', '${item.id}', '${escapeHtml(item.title).replace(/'/g, "\\'")}')">Edit Title</button>
                                    <button class="delete" onclick="deleteItem('document', '${item.id}')">Delete</button>
                                    <a href="document.html?id=${item.id}">View →</a>
                                </div>
                            </div>
                        `;
                    }
                }
                
                document.getElementById('uploads-list').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('uploads-list').innerHTML = '<div class="message">Error loading your uploads</div>';
            }
        }
        
        async function deleteItem(type, id) {
            if (!confirm('Are you sure you want to delete this?')) return;
            
            const table = type === 'video' ? 'videos' : 'documents';
            
            const { error } = await supabase
                .from(table)
                .delete()
                .eq('id', id)
                .eq('user_id', currentUser.id);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Deleted successfully');
                loadUploads();
            }
        }
        
        function editItem(type, id, currentTitle) {
            const newTitle = prompt('Enter new title:', currentTitle);
            if (newTitle && newTitle !== currentTitle) {
                updateTitle(type, id, newTitle);
            }
        }
        
        async function updateTitle(type, id, newTitle) {
            const table = type === 'video' ? 'videos' : 'documents';
            
            const { error } = await supabase
                .from(table)
                .update({ title: newTitle })
                .eq('id', id)
                .eq('user_id', currentUser.id);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Title updated');
                loadUploads();
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
