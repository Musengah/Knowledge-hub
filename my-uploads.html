<!DOCTYPE html>
<html>
<head>
    <title>My Uploads - Knowledge Hub</title>
</head>
<body>
    <div>
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="upload.html">Upload</a>
        <a href="login.html">Login</a>
    </div>
    
    <div id="login-prompt">
        <p>Please <a href="login.html">log in</a> to see your uploads</p>
    </div>
    
    <div id="uploads-container" style="display: none;">
        <h2>My Uploads</h2>
        <div id="uploads-list"></div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        
        window.onload = async function() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                currentUser = user;
                document.getElementById('login-prompt').style.display = 'none';
                document.getElementById('uploads-container').style.display = 'block';
                loadUploads();
            }
        };
        
        async function loadUploads() {
            try {
                // Fetch videos
                const { data: videos } = await supabase
                    .from('videos')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                // Fetch documents
                const { data: documents } = await supabase
                    .from('documents')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                const allItems = [
                    ...(videos || []).map(v => ({ ...v, type: 'video' })),
                    ...(documents || []).map(d => ({ ...d, type: 'document' }))
                ];
                
                if (allItems.length === 0) {
                    document.getElementById('uploads-list').innerHTML = '<p>You haven\'t uploaded anything yet. <a href="upload.html">Upload something!</a></p>';
                    return;
                }
                
                let html = '';
                
                for (let item of allItems) {
                    if (item.type === 'video') {
                        html += `
                            <div style="border: 1px solid #ddd; padding: 15px; margin-bottom: 10px;">
                                <h3>📹 ${escapeHtml(item.title)}</h3>
                                <p>${escapeHtml(item.category)} | ${item.institution ? escapeHtml(item.institution) : 'Independent'}</p>
                                <p>Uploaded: ${new Date(item.created_at).toLocaleDateString()}</p>
                                <button onclick="editItem('video', '${item.id}')">Edit</button>
                                <button onclick="deleteItem('video', '${item.id}')">Delete</button>
                                <a href="video.html?id=${item.id}">View</a>
                            </div>
                        `;
                    } else {
                        let icon = item.file_type === 'pdf' ? '📕' : '📘';
                        html += `
                            <div style="border: 1px solid #ddd; padding: 15px; margin-bottom: 10px;">
                                <h3>${icon} ${escapeHtml(item.title)}</h3>
                                <p>${escapeHtml(item.category)} | ${item.institution ? escapeHtml(item.institution) : 'Independent'}</p>
                                <p>${formatFileSize(item.file_size)} | Uploaded: ${new Date(item.created_at).toLocaleDateString()}</p>
                                <button onclick="editItem('document', '${item.id}')">Edit</button>
                                <button onclick="deleteItem('document', '${item.id}')">Delete</button>
                                <a href="document.html?id=${item.id}">View</a>
                            </div>
                        `;
                    }
                }
                
                document.getElementById('uploads-list').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function deleteItem(type, id) {
            if (!confirm('Are you sure you want to delete this?')) return;
            
            let table = type === 'video' ? 'videos' : 'documents';
            
            const { error } = await supabase
                .from(table)
                .delete()
                .eq('id', id)
                .eq('user_id', currentUser.id);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Deleted successfully');
                loadUploads();
            }
        }
        
        function editItem(type, id) {
            // Simple edit prompt for now
            const newTitle = prompt('Enter new title:');
            if (newTitle) {
                updateTitle(type, id, newTitle);
            }
        }
        
        async function updateTitle(type, id, newTitle) {
            let table = type === 'video' ? 'videos' : 'documents';
            
            const { error } = await supabase
                .from(table)
                .update({ title: newTitle })
                .eq('id', id)
                .eq('user_id', currentUser.id);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Title updated');
                loadUploads();
            }
        }
        
        function formatFileSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
