<!DOCTYPE html>
<html>
<head>
    <title>My Uploads - Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            margin: 0;
            color: #2c3e50;
        }
        
        .nav-links a {
            margin-left: 20px;
            color: #3498db;
            text-decoration: none;
        }
        
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
        }
        
        .login-prompt {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .login-prompt a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        
        .items-list {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .item-row {
            display: flex;
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
            align-items: center;
        }
        
        .item-row:last-child {
            border-bottom: none;
        }
        
        .thumbnail {
            width: 120px;
            height: 68px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-right: 20px;
            flex-shrink: 0;
        }
        
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .item-meta {
            font-size: 0.9em;
            color: #7f8c8d;
        }
        
        .item-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .edit-btn {
            background: #3498db;
            color: white;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 8px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .confirm-btn {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .cancel-btn {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .edit-form {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .save-btn {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .cancel-edit-btn {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .video-badge {
            background: #e74c3c;
            color: white;
        }
        
        .doc-badge {
            background: #27ae60;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Knowledge Hub</h1>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
            <a href="upload.html">Upload</a>
            <a href="my-uploads.html">My Uploads</a>
            <a href="login.html">Login</a>
        </div>
    </div>

    <div id="message" class="message"></div>
    
    <div id="login-prompt" class="login-prompt" style="display: none;">
        <p>Please <a href="login.html">log in</a> to see your uploaded content.</p>
    </div>
    
    <div id="uploads-container" style="display: none;">
        <h2 style="color: #2c3e50; margin-bottom: 20px;">My Uploads</h2>
        <div id="items-list" class="items-list">
            <div style="text-align: center; padding: 50px;">Loading...</div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <h3>Delete Item</h3>
            <p>Are you sure you want to delete this? This cannot be undone.</p>
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="confirmDelete()">Delete</button>
                <button class="cancel-btn" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit Form -->
    <div id="edit-form" class="edit-form">
        <h3>Edit Item</h3>
        <input type="hidden" id="edit-item-id">
        <input type="hidden" id="edit-item-type">
        
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="edit-title">
        </div>
        
        <div class="form-group">
            <label>Category</label>
            <select id="edit-category">
                <option value="Computer Science">Computer Science</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
                <option value="Engineering">Engineering</option>
                <option value="History">History</option>
                <option value="Literature">Literature</option>
                <option value="Research Paper">Research Paper</option>
                <option value="Thesis">Thesis</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Institution (optional)</label>
            <input type="text" id="edit-institution">
        </div>
        
        <div class="form-group">
            <label>Tags</label>
            <input type="text" id="edit-tags">
        </div>
        
        <div class="form-group">
            <label>Description</label>
            <textarea id="edit-description" rows="4"></textarea>
        </div>
        
        <button class="save-btn" onclick="saveEdit()">Save Changes</button>
        <button class="cancel-edit-btn" onclick="cancelEdit()">Cancel</button>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        let itemToDelete = null;
        let deleteType = null;
        
        window.onload = function() {
            checkAuth();
        };
        
        async function checkAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                currentUser = user;
                document.getElementById('login-prompt').style.display = 'none';
                document.getElementById('uploads-container').style.display = 'block';
                loadUserUploads();
            } else {
                document.getElementById('login-prompt').style.display = 'block';
                document.getElementById('uploads-container').style.display = 'none';
            }
        }
        
        async function loadUserUploads() {
            try {
                // Fetch from both tables
                const [videosResult, docsResult] = await Promise.all([
                    supabaseClient.from('videos').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
                    supabaseClient.from('documents').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false })
                ]);
                
                const videos = (videosResult.data || []).map(v => ({ ...v, type: 'video' }));
                const documents = (docsResult.data || []).map(d => ({ ...d, type: 'document' }));
                
                const allItems = [...videos, ...documents];
                allItems.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                const container = document.getElementById('items-list');
                
                if (allItems.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 50px;">You haven\'t uploaded anything yet. <a href="upload.html">Upload your first item!</a></div>';
                    return;
                }
                
                let html = '';
                
                for (let item of allItems) {
                    let icon = '';
                    let thumbnailHtml = '';
                    let typeLabel = '';
                    
                    if (item.type === 'video') {
                        icon = '📹';
                        typeLabel = 'Video';
                        thumbnailHtml = `<div class="thumbnail"><img src="https://img.youtube.com/vi/${item.youtube_id}/mqdefault.jpg"></div>`;
                    } else {
                        icon = item.file_type === 'pdf' ? '📕' : '📘';
                        typeLabel = item.file_type?.toUpperCase() || 'DOC';
                        thumbnailHtml = `<div class="thumbnail" style="background: #3498db; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">${icon}</div>`;
                    }
                    
                    html += `
                        <div class="item-row">
                            ${thumbnailHtml}
                            <div class="item-info">
                                <div class="item-title">
                                    ${icon} ${escapeHtml(item.title)}
                                    <span class="type-badge ${item.type === 'video' ? 'video-badge' : 'doc-badge'}">${typeLabel}</span>
                                </div>
                                <div class="item-meta">
                                    ${escapeHtml(item.category)} 
                                    ${item.institution ? '· ' + escapeHtml(item.institution) : ''}
                                    · ${new Date(item.created_at).toLocaleDateString()}
                                </div>
                            </div>
                            <div class="item-actions">
                                <button class="action-btn edit-btn" onclick="openEdit('${item.id}', '${item.type}')">Edit</button>
                                <button class="action-btn delete-btn" onclick="openDelete('${item.id}', '${item.type}')">Delete</button>
                            </div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('items-list').innerHTML = '<div style="text-align: center; padding: 50px;">Error loading your uploads</div>';
            }
        }
        
        async function openEdit(itemId, itemType) {
            const table = itemType === 'video' ? 'videos' : 'documents';
            
            const { data: item, error } = await supabaseClient
                .from(table)
                .select('*')
                .eq('id', itemId)
                .single();
            
            if (error) return;
            
            document.getElementById('edit-item-id').value = item.id;
            document.getElementById('edit-item-type').value = itemType;
            document.getElementById('edit-title').value = item.title;
            document.getElementById('edit-category').value = item.category;
            document.getElementById('edit-institution').value = item.institution || '';
            document.getElementById('edit-tags').value = item.tags;
            document.getElementById('edit-description').value = item.description || '';
            
            document.getElementById('edit-form').style.display = 'block';
            window.scrollTo({ top: document.getElementById('edit-form').offsetTop - 100, behavior: 'smooth' });
        }
        
        async function saveEdit() {
            const itemId = document.getElementById('edit-item-id').value;
            const itemType = document.getElementById('edit-item-type').value;
            const title = document.getElementById('edit-title').value;
            const category = document.getElementById('edit-category').value;
            const institution = document.getElementById('edit-institution').value;
            const tags = document.getElementById('edit-tags').value;
            const description = document.getElementById('edit-description').value;
            
            if (!title || !category || !tags) {
                showMessage('Please fill in required fields', 'error');
                return;
            }
            
            const table = itemType === 'video' ? 'videos' : 'documents';
            
            const { error } = await supabaseClient
                .from(table)
                .update({
                    title: title,
                    category: category,
                    institution: institution || null,
                    tags: tags,
                    description: description || null
                })
                .eq('id', itemId)
                .eq('user_id', currentUser.id);
            
            if (error) {
                showMessage('Error updating', 'error');
            } else {
                showMessage('Updated successfully!', 'success');
                cancelEdit();
                loadUserUploads();
            }
        }
        
        function cancelEdit() {
            document.getElementById('edit-form').style.display = 'none';
        }
        
        function openDelete(itemId, itemType) {
            itemToDelete = itemId;
            deleteType = itemType;
            document.getElementById('delete-modal').style.display = 'block';
        }
        
        async function confirmDelete() {
            if (!itemToDelete) return;
            
            const table = deleteType === 'video' ? 'videos' : 'documents';
            
            const { error } = await supabaseClient
                .from(table)
                .delete()
                .eq('id', itemToDelete)
                .eq('user_id', currentUser.id);
            
            if (error) {
                showMessage('Error deleting', 'error');
            } else {
                showMessage('Deleted successfully', 'success');
                loadUserUploads();
            }
            closeDeleteModal();
        }
        
        function closeDeleteModal() {
            itemToDelete = null;
            deleteType = null;
            document.getElementById('delete-modal').style.display = 'none';
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
