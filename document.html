<!DOCTYPE html>
<html>
<head>
    <title>View Document - Knowledge Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .nav {
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
        }
        .nav a {
            margin-right: 15px;
            color: blue;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back {
            margin-bottom: 15px;
        }
        .back a {
            color: blue;
            text-decoration: none;
        }
        h1 {
            font-size: 24px;
            margin: 15px 0;
        }
        .meta {
            color: #666;
            margin: 10px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .tags {
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin: 10px 0;
        }
        .description {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
        }
        .viewer {
            margin: 20px 0;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .download {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 15px;
        }
        .message {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="upload.html">Upload</a>
        <a href="my-uploads.html">My Uploads</a>
        <a href="login.html">Login</a>
    </div>
    
    <div class="container">
        <div class="back">
            <a href="browse.html">← Back to Browse</a>
        </div>
        <div id="content"></div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');
        
        if (!docId) {
            document.getElementById('content').innerHTML = '<div class="message">No document specified</div>';
        } else {
            loadDocument(docId);
        }
        
        async function loadDocument(id) {
            try {
                const { data: doc, error } = await supabase
                    .from('documents')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                let viewerHtml = '';
                
                if (doc.file_type === 'pdf') {
                    viewerHtml = `
                        <div class="viewer">
                            <iframe src="https://docs.google.com/viewer?url=${encodeURIComponent(doc.file_url)}&embedded=true"></iframe>
                            <p style="margin-top: 10px; font-size: 12px; color: #666;">If viewer doesn't load, <a href="${doc.file_url}" target="_blank">click here</a> to open directly</p>
                        </div>
                    `;
                } else if (doc.file_type === 'epub') {
                    viewerHtml = `
                        <div class="viewer">
                            <p>📖 EPUB files cannot be previewed in browser.</p>
                            <p>Download the file to read in your favorite EPUB reader.</p>
                        </div>
                    `;
                }
                
                const html = `
                    <h1>${escapeHtml(doc.title)}</h1>
                    <div class="meta">
                        <strong>${escapeHtml(doc.category)}</strong>
                        ${doc.institution ? ' · ' + escapeHtml(doc.institution) : ' · Independent'}
                        · ${(doc.file_size / 1024 / 1024).toFixed(1)} MB
                        · Added ${new Date(doc.created_at).toLocaleDateString()}
                    </div>
                    <div class="tags">🏷️ ${escapeHtml(doc.tags)}</div>
                    ${doc.description ? `<div class="description">${escapeHtml(doc.description).replace(/\n/g, '<br>')}</div>` : ''}
                    ${viewerHtml}
                    <div style="text-align: center;">
                        <a href="${doc.file_url}" download class="download">📥 Download ${doc.file_type.toUpperCase()}</a>
                    </div>
                `;
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="message">Error loading document</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
