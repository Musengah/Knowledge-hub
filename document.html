<!DOCTYPE html>
<html>
<head>
    <title>View Document - Knowledge Hub</title>
</head>
<body>
    <a href="browse.html">← Back</a>
    <div id="content"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wrpmepsxuvpsxwcglwcc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpg2ZIj_QEkHcNY0oFQLxA_XZWPeQJi';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');
        
        if (!docId) {
            document.getElementById('content').innerHTML = '<p>No document specified</p>';
        } else {
            loadDocument(docId);
        }
        
        async function loadDocument(id) {
            try {
                const { data: doc, error } = await supabase
                    .from('documents')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                let viewerHtml = '';
                
                if (doc.file_type === 'pdf') {
                    viewerHtml = `
                        <iframe src="https://docs.google.com/viewer?url=${encodeURIComponent(doc.file_url)}&embedded=true" 
                                style="width: 100%; height: 600px; border: none;">
                        </iframe>
                    `;
                } else if (doc.file_type === 'epub') {
                    viewerHtml = `
                        <p>EPUB files can be downloaded and viewed in your EPUB reader.</p>
                        <p><a href="${doc.file_url}" download>Download EPUB</a></p>
                    `;
                }
                
                const html = `
                    <h1>${escapeHtml(doc.title)}</h1>
                    <p>${escapeHtml(doc.category)} | ${doc.institution ? escapeHtml(doc.institution) + ' | ' : ''} ${formatFileSize(doc.file_size)}</p>
                    <p>Tags: ${escapeHtml(doc.tags)}</p>
                    ${doc.description ? `<p>${escapeHtml(doc.description)}</p>` : ''}
                    ${viewerHtml}
                    <p><a href="${doc.file_url}" download>Download File</a></p>
                `;
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<p>Error loading document</p>';
            }
        }
        
        function formatFileSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
